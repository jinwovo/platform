apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-messaging
  namespace: portfolio
spec:
  replicas: 2   # two pods behind one Service — cross-instance routing must work through Redis
  selector:
    matchLabels:
      app: realtime-messaging
  template:
    metadata:
      labels:
        app: realtime-messaging
    spec:
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z redis 6379; do echo waiting for redis; sleep 2; done"]
      containers:
        - name: app
          image: realtime-messaging:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT            # override k8s's auto-injected REDIS_PORT=tcp://<ip>:6379 (Service env collision)
              value: "6379"
            - name: KAFKA_BOOTSTRAP
              value: kafka:9092
            - name: JAVA_TOOL_OPTIONS
              value: "-Xmx256m"
            - name: INSTANCE_ID            # pod name → each replica reports a distinct instance
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: realtime-messaging
  namespace: portfolio
spec:
  selector:
    app: realtime-messaging
  ports:
    - port: 8080
      targetPort: 8080
