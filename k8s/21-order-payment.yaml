apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-payment
  namespace: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-payment
  template:
    metadata:
      labels:
        app: order-payment
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done"]
      containers:
        - name: app
          image: order-payment:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
          env:
            - name: DB_URL
              value: jdbc:postgresql://postgres:5432/orderpayment
            - name: DB_USER
              value: orderpayment
            - name: DB_PASSWORD
              value: orderpayment
            - name: KAFKA_BOOTSTRAP
              value: kafka:9092
            - name: JAVA_TOOL_OPTIONS
              value: "-Xmx256m"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: order-payment
  namespace: portfolio
spec:
  selector:
    app: order-payment
  ports:
    - port: 8090
      targetPort: 8090
